<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steer It</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="desktop">
    <canvas id="game"></canvas>

    <!-- Race readout (functional, on-brand). Shown only while race elements
         are active; independent of the D/Q debug toggles. -->
    <aside id="race-hud" hidden>
      <div id="race-timer">0:00.0</div>
      <div id="race-meta">
        <span id="race-cp"></span>
        <span id="race-lap"></span>
      </div>
    </aside>
    <div id="race-finish" hidden>
      <div class="rf-title">FINISH</div>
      <div id="race-finish-time">0:00.0</div>
    </div>

    <!-- Track editor (key E): tool palette + status. The canvas behind stays
         clickable for placing/dragging elements; only the palette takes input. -->
    <div id="editor" hidden>
      <div id="editor-bar">
        <div id="editor-palette">
          <button class="etool" type="button" data-tool="start">START</button>
          <button class="etool" type="button" data-tool="finish">FINISH</button>
          <button class="etool" type="button" data-tool="checkpoint">CHECKPOINT</button>
          <button class="etool" type="button" data-tool="delete">DELETE</button>
          <button id="editor-clear" type="button">CLEAR ALL</button>
        </div>
        <div id="editor-status"></div>
      </div>
      <div id="editor-hint">click to place · drag to move · E to exit</div>
    </div>

    <!-- Pause overlay (key P): dims the frozen game; gradient wordmark + hint. -->
    <div id="pause-overlay" hidden>
      <div id="pause-title">PAUSED</div>
      <div id="pause-hint">press P to resume</div>
    </div>

    <aside id="hud-tr">
      <div id="qr-panel">
        <div id="qr-logo">STEER&nbsp;IT</div>
        <div id="qr-scan">SCAN TO PLAY</div>
        <div id="qr-frame">
          <canvas id="qr" width="160" height="160"></canvas>
        </div>
        <div id="code-text">····</div>
        <div id="status">Waiting for phone…</div>
        <div id="lobby-roster"></div>
        <div id="qr-hint">press Q to hide</div>
      </div>
    </aside>

    <aside id="hud-bl">
      <div id="speedo">
        <div id="speed">000</div>
        <div id="speed-unit">KM/H</div>
        <button id="sound-toggle" type="button" title="Tap for sound (M)">🔇</button>
      </div>
      <div id="drift">GRIP</div>
      <div id="slip-readout">SLIP <span id="rear-slip-val">+0.0°</span></div>
      <div id="wspin-readout">WSPIN <span id="wspin-val">0%</span></div>
      <div id="pedal-hud">
        <div class="bar bar-gas">
          <div id="throttle-bar" class="bar-fill"></div>
          <span class="bar-label">GAS</span>
        </div>
        <div class="bar bar-brk">
          <div id="brake-bar" class="bar-fill"></div>
          <span class="bar-label">BRK</span>
        </div>
        <div id="handbrake-hud">HB</div>
      </div>
    </aside>

    <script type="module" src="/src/desktop.ts"></script>
  </body>
</html>
