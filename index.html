<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steer It</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="desktop">
    <canvas id="game"></canvas>

    <aside id="hud-tr">
      <div id="qr-panel">
        <canvas id="qr" width="160" height="160"></canvas>
        <div id="code-text">····</div>
        <div id="status">Waiting for phone…</div>
      </div>
    </aside>

    <aside id="hud-bl">
      <div id="speedo">
        <div id="speed">000</div>
        <div id="speed-unit">KM/H</div>
      </div>
      <div id="drift">DRIFT</div>
      <div id="pedal-hud">
        <div class="bar bar-gas">
          <div id="throttle-bar" class="bar-fill"></div>
          <span class="bar-label">GAS</span>
        </div>
        <div class="bar bar-brk">
          <div id="brake-bar" class="bar-fill"></div>
          <span class="bar-label">BRK</span>
        </div>
        <div id="handbrake-hud">HB</div>
      </div>
    </aside>

    <script type="module" src="/src/desktop.ts"></script>
  </body>
</html>
