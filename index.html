<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steer It</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="desktop">
    <canvas id="game"></canvas>

    <aside id="hud-tr">
      <div id="qr-panel">
        <div id="qr-logo">STEER&nbsp;IT</div>
        <div id="qr-scan">SCAN TO PLAY</div>
        <div id="qr-frame">
          <canvas id="qr" width="160" height="160"></canvas>
        </div>
        <div id="code-text">····</div>
        <div id="status">Waiting for phone…</div>
        <div id="qr-hint">press Q to hide</div>
      </div>
    </aside>

    <aside id="hud-bl">
      <div id="speedo">
        <div id="speed">000</div>
        <div id="speed-unit">KM/H</div>
        <button id="sound-toggle" type="button" title="Tap for sound (M)">🔇</button>
      </div>
      <div id="drift">GRIP</div>
      <div id="slip-readout">SLIP <span id="rear-slip-val">+0.0°</span></div>
      <div id="wspin-readout">WSPIN <span id="wspin-val">0%</span></div>
      <div id="pedal-hud">
        <div class="bar bar-gas">
          <div id="throttle-bar" class="bar-fill"></div>
          <span class="bar-label">GAS</span>
        </div>
        <div class="bar bar-brk">
          <div id="brake-bar" class="bar-fill"></div>
          <span class="bar-label">BRK</span>
        </div>
        <div id="handbrake-hud">HB</div>
      </div>
    </aside>

    <script type="module" src="/src/desktop.ts"></script>
  </body>
</html>
