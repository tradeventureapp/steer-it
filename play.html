<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Steer It — Controller</title>
    <!-- Retro-arcade display font (graceful fallback to system if offline). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="phone">
    <!-- Debug strip stays outside the rotated stage so it lives in real
         viewport coords. -->
    <div id="debug">init</div>

    <!-- All controller UI lives inside #phone-stage. The stage is sized
         to the screen's LANDSCAPE rectangle (100vmax × 100vmin) and
         JS-rotated to whatever angle keeps it visually upright in the
         player's view, based on the gravity vector. The player always
         sees landscape regardless of what iOS Safari reports. -->
    <div id="phone-stage">
      <button id="unlock" type="button">TAP TO STEER</button>

      <div id="pedals" hidden>
        <button id="pedal-brake" class="pedal" type="button" aria-label="Brake">
          <div class="pedal-fill"></div>
          <div class="pedal-saturation"></div>
          <span class="pedal-label">BRAKE</span>
        </button>
        <button id="pedal-throttle" class="pedal" type="button" aria-label="Throttle">
          <div class="pedal-fill"></div>
          <div class="pedal-saturation"></div>
          <span class="pedal-label">GAS</span>
        </button>
        <button id="handbrake" type="button" aria-label="Handbrake">
          <span class="pedal-label">E-BRAKE</span>
        </button>
      </div>

      <div id="error" hidden></div>
    </div>

    <script type="module" src="/src/phone.ts"></script>
  </body>
</html>
