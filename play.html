<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Steer It — Controller</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="phone">
    <!-- Debug strip stays outside the rotated stage so it lives in real
         viewport coords. -->
    <div id="debug">init</div>

    <!-- All controller UI lives inside #phone-stage, which we rotate -90°
         in CSS when the device reports portrait — so the player always
         sees landscape regardless of what iOS Safari decides. -->
    <div id="phone-stage">
      <button id="unlock" type="button">TAP TO STEER</button>

      <div id="pedals" hidden>
        <button id="pedal-brake" class="pedal" type="button" aria-label="Brake">
          <span class="pedal-label">BRAKE</span>
        </button>
        <button id="pedal-throttle" class="pedal" type="button" aria-label="Throttle">
          <span class="pedal-label">GAS</span>
        </button>
      </div>

      <div id="error" hidden></div>
    </div>

    <script type="module" src="/src/phone.ts"></script>
  </body>
</html>
